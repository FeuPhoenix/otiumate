<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Primary SEO -->
    <title>Otiumate — Where Great Ideas Become Great Products</title>
    <meta name="description" content="Otiumate builds tools and products that give people their time back. We turn ambitious ideas into exceptional digital experiences." />
    <meta name="keywords" content="Otiumate, startup, product development, web development, mobile apps, AI, design" />
    <meta name="author" content="Otiumate" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://otiumate.com" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://otiumate.com" />
    <meta property="og:title"       content="Otiumate — Where Great Ideas Become Great Products" />
    <meta property="og:description" content="We build tools and products that give people their time back. Strategy, design, engineering — end to end." />
    <meta property="og:image"       content="https://otiumate.com/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="Otiumate" />
    <meta property="og:locale"      content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@otiumate" />
    <meta name="twitter:creator"     content="@otiumate" />
    <meta name="twitter:title"       content="Otiumate — Where Great Ideas Become Great Products" />
    <meta name="twitter:description" content="We build tools and products that give people their time back." />
    <meta name="twitter:image"       content="https://otiumate.com/og-image.png" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#090909" />
    <meta name="color-scheme" content="dark" />

    <!-- TODO: Replace G-XXXXXXXXXX with your real Google Analytics Measurement ID -->
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <!-- Structured data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Otiumate",
      "url": "https://otiumate.com",
      "logo": "https://otiumate.com/logo.png",
      "description": "Otiumate builds tools and products that give people their time back.",
      "sameAs": [
        "https://github.com/FeuPhoenix",
        "https://linkedin.com/company/otiumate",
        "https://twitter.com/otiumate"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
