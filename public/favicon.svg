<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%"   stop-color="#1a237e"/>
      <stop offset="45%"  stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#00ACC1"/>
    </linearGradient>
  </defs>
  <!-- Outer arc — dark, clockwise from top-right to bottom-left -->
  <path d="M 72 8 A 46 46 0 1 0 18 72"
        fill="none" stroke="#111827" stroke-width="10" stroke-linecap="round"/>
  <!-- M letterform -->
  <path d="M 20 70 L 20 38 L 50 58 L 80 38 L 80 70"
        fill="none" stroke="url(#grad)" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Curved bottom connecting the O -->
  <path d="M 80 68 Q 65 88 50 88 Q 35 88 20 68"
        fill="none" stroke="url(#grad)" stroke-width="10" stroke-linecap="round"/>
</svg>
